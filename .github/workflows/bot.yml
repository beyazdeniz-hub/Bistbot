name: BIST Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 6-20 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Paketleri kur
        run: npm install

      - name: Botu calistir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node bot.js

      - name: Git ayarla
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Degisiklik varsa commit at
        run: |
          git add signals.json
          git diff --cached --quiet || git commit -m "signals.json guncellendi"

      - name: Pull rebase yap
        run: |
          git pull origin main --rebase

      - name: Push yap
        run: |
          git push origin main