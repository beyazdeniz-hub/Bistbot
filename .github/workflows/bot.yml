name: BIST Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 9-15 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Chromium kur
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libx11-xcb1 \
            libxshmfence1 \
            fonts-liberation \
            ca-certificates

      - name: Bağımlılıkları kur
        run: npm install

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
        run: npm start