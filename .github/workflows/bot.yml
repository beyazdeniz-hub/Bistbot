name: Signal Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NPM install
        run: npm install

      - name: Puppeteer browser kur
        run: npx puppeteer browsers install chrome

      - name: Botu calistir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node bot.js

      - name: signals.json artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: signals-json
          path: signals.json
          if-no-files-found: ignore