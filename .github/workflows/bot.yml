name: BIST Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: bist-bot-main
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Paketleri yükle
        run: npm install

      - name: Cache klasörü oluştur
        run: mkdir -p $PUPPETEER_CACHE_DIR

      - name: Chrome ve bağımlılıkları kur
        run: npx puppeteer browsers install chrome --install-deps

      - name: Kurulu browserları listele
        run: npx puppeteer browsers list

      - name: Chrome yolunu yazdır
        run: |
          echo "PUPPETEER_CACHE_DIR=$PUPPETEER_CACHE_DIR"
          find $PUPPETEER_CACHE_DIR -type f | sort || true

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer
        run: node bot.js

      - name: Git ayarları
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Uzak değişiklikleri al
        run: |
          git pull --rebase origin main || true

      - name: Değişiklik varsa commit at
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Bot verileri guncellendi"

      - name: Push et
        run: |
          git push origin main