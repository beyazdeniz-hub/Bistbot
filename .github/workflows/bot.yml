name: Signal Bot

on:
  workflow_dispatch:
  schedule:
    # Seans içi tarama
    # Türkiye: 10:00 - 18:00
    # UTC: 07:00 - 15:59
    - cron: "*/10 7-15 * * 1-5"

    # Onay alanlar
    # Türkiye 21:30 = UTC 18:30
    - cron: "30 18 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo çek
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: NPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Bağımlılıkları kur
        run: npm install

      - name: Mod belirle
        run: |
          echo "EVENT_NAME=${{ github.event_name }}"
          echo "EVENT_SCHEDULE=${{ github.event.schedule }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BOT_MODE=intraday" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 18 * * 1-5" ]; then
            echo "BOT_MODE=approved" >> $GITHUB_ENV
          else
            echo "BOT_MODE=intraday" >> $GITHUB_ENV
          fi

          echo "Seçilen BOT_MODE=$BOT_MODE"

      - name: Çalışma öncesi dosyaları göster
        run: |
          echo "Repo içeriği:"
          ls -la

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE: ${{ env.BOT_MODE }}
        run: |
          echo "Bot başlıyor. Mod: $BOT_MODE"
          node bot.js

      - name: Çalışma sonrası dosyaları göster
        if: always()
        run: |
          echo "Çalışma sonrası repo içeriği:"
          ls -la

          echo "approved_signals.json:"
          [ -f approved_signals.json ] && cat approved_signals.json || echo "Yok"

          echo "intraday_signals.json:"
          [ -f intraday_signals.json ] && cat intraday_signals.json || echo "Yok"

          echo "bot_state.json:"
          [ -f bot_state.json ] && cat bot_state.json || echo "Yok"

          echo "last_signals.json:"
          [ -f last_signals.json ] && cat last_signals.json || echo "Yok"

      - name: Git ayarla
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Commit hazırla
        run: |
          git add approved_signals.json intraday_signals.json bot_state.json last_signals.json || true
          git status

          if git diff --cached --quiet; then
            echo "CHANGES_EXIST=false" >> $GITHUB_ENV
            echo "Commitlenecek değişiklik yok."
          else
            echo "CHANGES_EXIST=true" >> $GITHUB_ENV
            git commit -m "Bot verileri güncellendi"
          fi

      - name: Rebase al
        if: env.CHANGES_EXIST == 'true'
        run: |
          git pull origin main --rebase || true

      - name: Push et
        if: env.CHANGES_EXIST == 'true'
        run: |
          git push