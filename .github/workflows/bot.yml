name: Signal Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 9-15 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sistem paketleri kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libjpeg-dev \
            libpango1.0-dev \
            libgif-dev \
            librsvg2-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6 \
            fonts-liberation \
            xdg-utils

      - name: npm install
        run: npm install

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_CUSTOM }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: node bot.js

      - name: Değişiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals.json onay.json seans.json history.json charts tmp_charts || true
          git commit -m "Bot verilerini güncelle" || echo "Commit yok"
          git push