name: Signal Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NPM install
        run: npm install

      - name: Puppeteer Chrome kur
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: npx puppeteer browsers install chrome@stable

      - name: Kurulu browserlari goster
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: node -e "const {getInstalledBrowsers}=require('@puppeteer/browsers'); (async()=>{console.log(await getInstalledBrowsers({cacheDir:process.env.PUPPETEER_CACHE_DIR}))})()"

      - name: Botu calistir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: node bot.js
